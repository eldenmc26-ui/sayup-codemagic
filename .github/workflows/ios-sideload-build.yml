name: iOS Sideload Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix permissions
        run: chmod -R +x node_modules/.bin || true

      - name: Expo install
        run: npx expo install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      # 🔥 FIX CRITICO: aggiunge funzione mancante get_folly_config
      - name: Patch Podfile (fix folly error)
        run: |
          cat << 'EOF' >> ios/Podfile

          # --- FIX CI ---
          def get_folly_config
            return { :compiler_flags => "" }
          end
          # ---------------
          EOF

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy-Sideload.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-iOS-IPA
          path: Talksy-Sideload.ipa
