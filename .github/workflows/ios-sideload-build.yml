name: iOS Sideload Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ✅ CocoaPods aggiornato
      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      # ✅ pulizia per evitare bug strani
      - name: Clean project
        run: |
          rm -rf ios
          rm -rf node_modules/.cache

      # ✅ FIX PERMISSION + prebuild
      - name: Expo Prebuild
        env:
          EXPO_NO_FLIPPER: 1
        run: |
          chmod +x node_modules/.bin/expo
          npx expo prebuild --platform ios

      # ✅ install pods pulito
      - name: Install Pods
        env:
          EXPO_NO_FLIPPER: 1
        run: |
          cd ios
          pod deintegrate
          pod install --repo-update

      # ✅ build Xcode senza firma
      - name: Build Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # ✅ crea IPA
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy-Sideload.ipa Payload

      # ✅ upload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-iOS-IPA
          path: Talksy-Sideload.ipa
