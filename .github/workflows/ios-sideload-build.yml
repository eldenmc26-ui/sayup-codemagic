name: iOS IPA Build (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Node stabile compatibile Expo tooling
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Install dependencies (IMPORTANTE legacy-peer-deps qui)
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      # 🔧 Fix permission error expo binary
      - name: Fix permissions
        run: |
          chmod -R +x node_modules/.bin || true
          npx expo-doctor --fix || true

      # 📱 Expo install SAFE (NO node_modules expo call diretto)
      - name: Expo install safe
        run: npx --yes expo install

      # 🧹 Clean iOS folder (evita conflitti pod vecchi)
      - name: Clean iOS
        run: rm -rf ios

      # 📱 Expo prebuild pulito
      - name: Expo prebuild
        env:
          # Forza la disabilitazione di Flipper che causa problemi con folly config
          EXPO_NO_FLIPPER: 1
        run: npx expo prebuild --platform ios --clean --no-install

      # 🍫 CocoaPods setup stabile
      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      # 📦 Install Pods
      - name: Install Pods
        env:
          EXPO_NO_FLIPPER: 1
        run: |
          cd ios
          pod install

      # 🧱 Build iOS unsigned
      - name: Build Xcode
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 Create IPA
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

      # 📤 Upload artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-IPA
          path: Talksy.ipa
