name: iOS Sideload Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Node stabile (evita tutti gli EBADENGINE)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Install base deps con fix peer deps
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 🔥 evita errore "expo permission denied"
      - name: Fix permissions
        run: chmod -R +x node_modules/.bin || true

      # ✅ NON usare expo@latest (rompe tutto)
      - name: Expo install safe
        run: npx expo install -- --legacy-peer-deps

      # 🔥 Prebuild pulito
      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      # ✅ CocoaPods stabile
      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS unsigned
      - name: Build Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA packaging
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy-Sideload.ipa Payload

      # 📤 Upload artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-iOS-IPA
          path: Talksy-Sideload.ipa
