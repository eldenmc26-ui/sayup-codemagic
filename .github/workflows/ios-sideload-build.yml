name: iOS Sideload Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 📥 Checkout del codice
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Setup Node 20 (Richiesto da Expo 55)
      - name: Setup Node
        uses: actions/setup-node@v4
        with: # Expo SDK 52 richiede Node 18
          node-version: 18 # Expo SDK 50 richiede Node 18
          cache: 'npm'

      # 📦 Installazione dipendenze (Usa .npmrc per legacy-peer-deps)
      - name: Install Dependencies
        run: npm install

      # 🧹 Pulizia profonda node_modules (Fix per l'errore Example.xcworkspace)
      - name: Cleanup node_modules junk
        run: |
          find node_modules -name "Podfile" -exec rm -rf {} + || true
          find node_modules -name "*.xcworkspace" -exec rm -rf {} + || true

      # 📱 Expo Prebuild (Generazione cartella ios)
      - name: Expo Prebuild
        env:
          EXPO_NO_FLIPPER: 1
        run: npx expo prebuild --platform ios --clean --no-install # --no-install per evitare pod install automatico

      # 🍫 Installazione CocoaPods
      - name: Install Pods
        working-directory: ios
        env:
          EXPO_NO_FLIPPER: 1
        run: pod install # Installazione dei pod

      # 🧱 Build Xcode Unsigned (Tutti i flag extra inclusi)
      - name: Build Xcode
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme sayup \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""

      # 📦 Creazione pacchetto IPA per Sideloadly
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r SayUp.ipa Payload

      # 📤 Caricamento file finale
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SayUp-IPA
          path: SayUp.ipa
