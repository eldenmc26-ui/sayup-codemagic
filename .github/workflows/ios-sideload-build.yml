name: iOS IPA Build (WORKING)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 Node stabile compatibile Expo
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 install base deps (senza rompere alberi dipendenze)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 🔥 FIX CHIAVE: usa Expo compatibile invece di latest
      - name: Install Expo compatible
        run: |
          npx expo install -- --legacy-peer-deps
          npx expo install react-native -- --legacy-peer-deps

      # 🧹 pulizia iOS
      - name: Clean ios
        run: rm -rf ios

      # 📱 prebuild stabile
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      # 🔧 CocoaPods stabile
      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Install Pods
        run: |
          cd ios
          pod install

      # 🧱 build unsigned IPA
      - name: Build iOS
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA packaging
      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

      # 📤 artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-IPA
          path: Talksy.ipa
