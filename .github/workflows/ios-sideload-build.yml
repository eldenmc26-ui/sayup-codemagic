name: iOS Sideload Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Node 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 FORZA XCODE 16
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ✅ install deps
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ✅ fix permessi
      - name: Fix node_modules permissions
        run: chmod -R +x node_modules/.bin || true

      # 🔥 fix Expo + RN
      - name: Fix Expo dependencies
        run: |
          npx --yes expo@55 install react-native -- --legacy-peer-deps
          npx --yes expo@55 install -- --legacy-peer-deps

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Clean project
        run: |
          rm -rf ios
          rm -rf node_modules/.cache

      - name: Expo Prebuild
        run: npx --yes expo@55 prebuild --platform ios

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy-Sideload.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Talksy-iOS-IPA
          path: Talksy-Sideload.ipa
