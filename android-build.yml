name: Android Build
on: # Trigger manuale per il workflow
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: # Expo SDK 52 richiede Node 18
          node-version: 18 # Expo SDK 50 richiede Node 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Grant execute permissions to Expo CLI
        # Assicura che l'eseguibile di Expo abbia i permessi di esecuzione
        run: chmod +x node_modules/.bin/expo

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: npx eas-cli build --profile development --platform android --non-interactive