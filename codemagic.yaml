workflows:
  ios-sayup:
    name: SayUp iOS IPA Clean Build

    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      node: 18 # Expo SDK 50 richiede Node 18
      xcode: latest
      cocoapods: default

    scripts:

      # 💣 CLEAN TOTAL
      - name: Clean project
        script: |
          rm -rf node_modules
          rm -rf ios
          rm -rf package-lock.json
          npm cache clean --force

      # 📦 INSTALL CLEAN (no legacy CLI issues)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --force

      # 🔧 FIX BIN PERMISSION (Expo CLI bug fix)
      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild CLEAN
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      # 🩹 Patch Podfile
      - name: Patch Podfile for BoringSSL and deployment targets
        script: |
          node scripts/patch-podfile.js

      # 🍫 Pods
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme SayUp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r SayUp.ipa Payload

    artifacts:
      - SayUp.ipa
