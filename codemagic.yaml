workflows:
  ios-clean:
    name: Talksy Clean iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:

      # 💣 NUCLEAR CLEAN
      - name: Clean everything
        script: |
          rm -rf node_modules
          rm -rf ios
          rm -rf package-lock.json
          npm cache clean --force

      # 📦 INSTALL CLEAN (solo da package.json)
      - name: Install dependencies clean
        script: |
          npm install --legacy-peer-deps --force

      # 🔧 FIX PERMISSIONS (Expo CLI fix CI)
      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild FRESH
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 CocoaPods clean install
      - name: CocoaPods install
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa
