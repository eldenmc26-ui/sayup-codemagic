workflows:
  ios-sideload:
    name: Talksy iOS IPA (Fixed Expo Prebuild)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ios/Pods

    scripts:

      # 📦 install dependencies (IMPORTANTE per gifted-chat + RN)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      # 🔧 FIX CRITICO: elimina expo-cli legacy globale (causa del tuo errore)
      - name: Remove legacy Expo CLI
        script: |
          npm uninstall -g expo-cli || true

      # 📦 install expo moderno localmente
      - name: Ensure Expo CLI
        script: |
          npm install expo@latest

      # 📱 Expo prebuild (ORA SAFE)
      - name: Expo prebuild (safe)
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 CocoaPods install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS unsigned
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 Create IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa

    publishing:
      email:
        recipients:
          - dev@talksy.app
        notify:
          success: true
          failure: true
