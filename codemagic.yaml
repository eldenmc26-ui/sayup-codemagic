workflows:
  ios-clean-build:
    name: Talksy iOS Clean Rebuild IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:

      # 💣 NUCLEAR CLEAN (TUTTO RESETTATO OGNI VOLTA)
      - name: Clean everything
        script: |
          echo "🧹 Removing node_modules, ios, pods, caches..."
          rm -rf node_modules
          rm -rf ios
          rm -rf package-lock.json
          npm cache clean --force

      # 📦 Fresh install (forza tutto senza conflitti)
      - name: Install dependencies fresh
        script: |
          npm install --legacy-peer-deps --force

      # 🔧 Fix permissions (expo CLI fix)
      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild from scratch
      - name: Expo prebuild clean
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 CocoaPods fresh install
      - name: Install CocoaPods fresh
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS unsigned
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 Create IPA
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa
