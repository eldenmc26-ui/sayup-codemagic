workflows:
  ios-sideload:
    name: Talksy IPA Fixed Permissions
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:

      # 📦 install deps (FORCE per evitare conflict gifted-chat)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --force

      # 🔧 FIX CRITICO: permessi binari npm (RISOLVE ERRORE 126)
      - name: Fix npm permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild (IMPORTANTE: SOLO npx, NON binario locale)
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 CocoaPods
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa
