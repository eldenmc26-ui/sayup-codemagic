workflows:
  ios-ipa:
    name: Talksy iOS IPA Stable Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ios/Pods

    scripts:

      # 📦 INSTALL FORZATO (risolve gifted-chat + RN conflicts)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --force

      # 🔧 FIX PERMESSI BINARI (risolve expo permission denied)
      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild (SEMPRE npx)
      - name: Expo prebuild clean
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 CocoaPods install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS unsigned
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 Create IPA
      - name: Package IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa
