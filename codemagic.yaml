workflows:
  ios-sayup:
    name: SayUp iOS IPA Clean Build

    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      node: 18 # Expo SDK 50 richiede Node 18
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ~/Library/Caches/CocoaPods

    scripts:

      # 💣 CLEAN TOTAL
      - name: Clean project
        script: |
          rm -rf ios

      # 📦 INSTALL CLEAN (no legacy CLI issues)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      # 🔧 FIX BIN PERMISSION (Expo CLI bug fix)
      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      # 📱 Expo prebuild CLEAN
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      # 🩹 Patch Podfile
      - name: Patch Podfile for BoringSSL and deployment targets
        script: |
          node scripts/patch-podfile.js

      # 🍫 Pods
      - name: Install CocoaPods
        script: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      # 🧱 Build iOS
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme SayUp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO > build.log 2>&1 || (echo "=== BUILD ERROR LOGS ===" && grep -i -C 10 "error:" build.log || tail -n 200 build.log; exit 1)

      # 📦 IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r SayUp.ipa Payload

    artifacts:
      - SayUp.ipa

  macos-remote-debug:
    name: macOS Remote Debug Session (VNC/SSH)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Fix permissions
        script: |
          chmod -R +x node_modules/.bin || true

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Patch Podfile for Xcode 16 & C++17
        script: |
          node scripts/patch-podfile.js

      - name: Patch for Free Developer Account (Disable Push Notifications)
        script: |
          node scripts/patch-free-signing.js

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Hold build for VNC/SSH connection
        script: |
          echo "=========================================================="
          echo "BUILD IS HELD FOR INTERACTIVE DEBBUGING."
          echo "Ensure 'Enable SSH/VNC access' was checked in the Build UI."
          echo "Open VNC viewer and connect using the details in the tab above."
          echo "You can open Xcode by double-clicking 'ios/SayUp.xcworkspace'."
          echo "=========================================================="
          while true; do sleep 60; done

