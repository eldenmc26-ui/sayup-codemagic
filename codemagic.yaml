workflows:
  ios-sideload:
    name: Talksy IPA FIX FORCE MODE
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:

      # 🔥 FORZA install (risolve gifted-chat conflict)
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --force

      # 📱 Expo prebuild (SOLO QUESTO)
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      # 🍫 Pods
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      # 🧱 Build iOS unsigned
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme talksy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 📦 IPA
      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Talksy.ipa Payload

    artifacts:
      - Talksy.ipa
